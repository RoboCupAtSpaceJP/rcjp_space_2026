    x_range: [10.8, 11.0]
    y_range: [-3.8, -3.3]
    z_range: [4.0, 4.3]

  navigation_area:
    x_range: [10.0, 12.0]
    y_range: [-8.0, -3.8]
    z_range: [4.0, 6.0]

  search_area:
    x_range: [10.0, 12.0]
